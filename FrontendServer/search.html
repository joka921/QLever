<html>
  <head>
    <title> Fuzzy City Search </title>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8"> 



    <link rel="stylesheet" type="text/css" href="search.css"/>
    <script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>
    <script src="js_cookie.js"></script>
    <script src="search.js"></script>
    <script src="search2.js"></script>
  </head>
  <body>
    <div class="normal" id="heading">The Western European Fuzzy City searcher</div>
    Search for a city using the search bar. Click at a result to see
    the position<br />

    <div id = "left">
  <button type ="button" onclick="viewSource()">View Source</button>
    <input id="query"/><br />
    <fieldset id="searchmodeButtons">
      <input type="radio" id="radioAll" name="searchtype" value="all"
      checked="checked">
      <label for="radioAll"> All Entities</label>
      <input type="radio" id="radioObj" name="searchtype" value="obj">
      <label for="radioObj"> Subjects/ Objects</label>
      <input type="radio" id="radioPred" name="searchtype" value="prd">
      <label for="radioPred"> Predicates Only</label>
    </fieldset>


    <div id="searchRes" class="resClass"> </div>
    <div id = "thanks"> </div>
    </div>
    <div id="right">
      <div id="triples">
        <div class="triple" id="variables">
          <div class="variable" id="x0" wdName="?x0" draggable="true"
            ondragstart="drag(event)" readableName="?x0">?x0
            <input type="checkbox" id="selectedX0" value="?x0">
          </div>
          <div class="variable" id="x1" wdName="?x1" draggable="true"
            ondragstart="drag(event)" readableName="?x1">?x1 
            <input type="checkbox" id="selectedX1" value="?x1">
          </div>
          <div class="variable" id="x2" wdName="?x2" draggable="true" ondragstart="drag(event)" readableName="?x2" >?x2
            <input type="checkbox" id="selectedX2" value="?x2">
          </div>
          <div class="variable" id="x3" wdName="?x3" draggable="true" ondragstart="drag(event)" readableName="?x3" >?x3
            <input type="checkbox" id="selectedX3" value="?x3">
        </div>
        </div>
      <div class="triple" id="triple0">
        <div class="subject" id="subject0" ondrop="drop(event)" ondragover="allowDrop(event)"
          ondragenter="markPossibleDragTarget(event)"
          ondragleave="unmarkPossibleDragTarget(event)"
          onclick="showDetails(this)"> </div>
        <div class="property" id="property0" ondrop="drop(event)" ondragover="allowDrop(event)"
          ondragenter="markPossibleDragTarget(event)"
          ondragleave="unmarkPossibleDragTarget(event)" 
          onclick="showDetails(this)"> </div>
        <div class="object" id="object0" ondrop="drop(event)" ondragover="allowDrop(event)"
          ondragenter="markPossibleDragTarget(event)"
          ondragleave="unmarkPossibleDragTarget(event)"
          onclick="showDetails(this)"> </div>
        <button class="deleteTripleButton" onclick="removeTriple(0)"> - </button>
      </div>
      </div>
      <div class="triple">
        <button class="addTripleButton" onclick="addTriple()">Add Triple </button>
    </div>
      <div class="triple">
        <button class="addTripleButton"
          onclick="removeEmptyTriples()">SendQuery(notWorking) </button>
      </div>
      <div class="tripleDesc"><div class="resClass" id="detailRes"></div></div>
    <div id="queryRes" class="resClass"></div>
    </div>
    <div id="coverup"> </div>
  </body>
</html>
